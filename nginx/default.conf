server {
    listen 80;
    server_name autorepetit.com www.autorepetit.com;
    return 301 https://autorepetit.com$request_uri;
}

server {
    listen 443 ssl;
    server_name autorepetit.com www.autorepetit.com;

    ssl_certificate /etc/letsencrypt/live/autorepetit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autorepetit.com/privkey.pem;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # n8n - точный префикс без регулярных выражений
    location /n8n/ {
        proxy_pass http://n8n:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Поддержка больших файлов и событий
        chunked_transfer_encoding on;
        proxy_buffering off;
        proxy_cache off;

        # Поддержка WebSocket для n8n
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Frontend - всё остальное идет сюда
    location / {
        proxy_pass http://frontend:3028;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Поддержка WebSocket для Vite HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
