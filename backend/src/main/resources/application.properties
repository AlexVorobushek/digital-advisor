spring.application.name=advisor
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:advisor}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (should be in env in prod)
advisor.app.jwtSecret=advisorSecretKeyAdvisorSecretKeyAdvisorSecretKeyAdvisorSecretKey
advisor.app.jwtExpirationMs=86400000

# n8n Configuration
N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:https://n8n.homoauthenticus.ru/webhook/advisor-chat}
N8N_USER=${N8N_USER:}
N8N_PASSWORD=${N8N_PASSWORD:}
