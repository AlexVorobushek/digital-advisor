services:
  db:
    image: postgres:15-alpine
    container_name: advisor-db
    environment:
      POSTGRES_DB: advisor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: advisor-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: advisor
      DB_USER: postgres
      DB_PASSWORD: postgres
      # Теперь n8n ожидает префикс /n8n/ даже во внутренней сети
      N8N_WEBHOOK_URL: https://n8n.homoauthenticus.ru/webhook/advisor-chat
      N8N_USER: admin
      N8N_PASSWORD: admin
    depends_on:
      - db

  frontend:
    build:
      context: ./reactAppV2
      dockerfile: Dockerfile
    container_name: advisor-frontend
    ports:
      - "3028:3028"
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    container_name: advisor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
